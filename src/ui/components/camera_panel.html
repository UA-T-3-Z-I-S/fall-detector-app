<div id="camera-panel">
  <div class="camera-feed" style="position: relative; width: 640px; height: 360px;">
    <div id="cam-placeholder" style="position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">Cargando cámara...</div>
    <div class="camera-label" style="position: absolute; bottom:5px; left:5px; color:white; z-index:10;"></div>
    <canvas id="overlay-canvas" width="640" height="360"
            style="position:absolute; top:0; left:0; z-index:5; pointer-events:none;"></canvas>
  </div>
</div>
