<link rel="stylesheet" href="./ui/styles/residentes_form.css" />

<div id="modal-resident-form" class="modal hidden">
  <div class="modal-content-form">
    <h2>Agregar Nuevo Residente</h2>

    <form id="resident-form" novalidate>
      <label>Nombre</label>
      <input type="text" name="nombre" maxlength="30" required />

      <label>Apellido</label>
      <input type="text" name="apellido" maxlength="30" required />

      <label>DNI</label>
      <input type="text" name="dni" maxlength="8" required />

      <label>Sexo</label>
      <select name="sexo" id="sexo-dropdown" required>
        <option value="">Seleccione sexo</option>
      </select>

      <label>Fecha de Nacimiento</label>
      <input type="date" name="fecha_nacimiento" required />

      <label>Pabellón</label>
      <select name="pabellon" id="pabellon-dropdown" required>
        <option value="">Seleccione pabellón</option>
      </select>

      <div class="modal-buttons">
        <button type="submit">Guardar</button>
        <button type="button" id="close-form-btn">Cerrar</button>
      </div>
    </form>
  </div>
</div>
