<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./ui/styles/topbar.css" />
    <link rel="stylesheet" href="./ui/styles/dashboard.css" />
    <title>Dashboard - Sistema IA</title>
  </head>
<div class="topbar">
  <div class="topbar-left">
    <h1>Sistema IA Araoz</h1>
  </div>

  <div class="topbar-right">
    <span id="engine-label">Motor IA</span>
    <label class="switch" id="engine-switch">
      <input type="checkbox" id="engine-toggle" />
      <span class="slider"></span>
    </label>

    <!-- ⚙️ Nuevo botón -->
    <button id="open-config-btn">⚙️</button>

    <button id="logout-btn">Cerrar sesión</button>
  </div>
</div>
