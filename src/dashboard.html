<link rel="stylesheet" href="./ui/styles/topbar.css">
<div id="topbar-container"></div>

<div id="dashboard-content">
  <!-- Aquí va el contenido real del dashboard -->
  <h2>Bienvenido al Dashboard</h2>
</div>

<script>
  // Cargar topbar
  fetch('./ui/components/topbar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('topbar-container').innerHTML = html;

      // Asociar función al botón de cerrar sesión
      const logoutBtn = document.getElementById('logout-btn');
      logoutBtn.addEventListener('click', () => {
        // Por ejemplo, volver al login
        window.location.href = 'index.html';
        // O si quieres usar Electron IPC:
        // window.api.logout();
      });
    });
</script>
